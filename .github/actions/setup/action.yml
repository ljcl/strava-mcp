name: Setup
description: Install Bun, restore the Turborepo cache, and install dependencies. Caller must run actions/checkout first.
runs:
  using: composite
  steps:
    - name: Install Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        # Single source of truth: the packageManager field in root
        # package.json, so CI follows Dependabot's bumps automatically.
        bun-version-file: package.json

    - name: Restore Turborepo cache
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: .turbo
        key: ${{ runner.os }}-turbo-${{ github.sha }}
        restore-keys: |
          ${{ runner.os }}-turbo-

    - name: Install dependencies
      run: bun install --frozen-lockfile
      shell: bash
