name: Chromatic

# Publishes the Storybook for each PR (and main) to Chromatic so reviewers get a
# hosted, clickable Storybook for the branch under review, plus visual regression
# diffs. The main deploy (storybook.yml -> GitHub Pages) is left untouched.
#
# Requires the CHROMATIC_PROJECT_TOKEN repo secret. Until it is set, this workflow
# fails on the publish step; everything else (storybook.yml) is unaffected.

on:
  push:
    branches: [main]
    paths:
      - "packages/**"
      - "apps/storybook/**"
      - "bun.lock"
      - ".github/workflows/chromatic.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/**"
      - "apps/storybook/**"
      - "bun.lock"
      - ".github/workflows/chromatic.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  chromatic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # Chromatic needs full git history to find the baseline commit.
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Build Storybook
        run: bun run build-storybook

      - name: Publish to Chromatic
        uses: chromaui/action@1db61b73b7919508ee8e62336f04bd0aed6da756 # v17.4.1
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Reuse the artifact turbo just built; do not let Chromatic rebuild.
          storybookBuildDir: apps/storybook/storybook-static
          # TurboSnap: only snapshot stories affected by the diff (conserves the
          # free-plan snapshot budget). Relies on preview-stats.json, emitted by
          # the --stats-json flag in apps/storybook build:storybook.
          onlyChanged: true
          # Monorepo: Storybook lives under apps/storybook, so map repo-root git
          # paths to the module paths recorded in preview-stats.json.
          storybookBaseDir: apps/storybook
          # This is a review aid, not a merge gate: visual changes should not fail
          # the PR. The Chromatic check still surfaces the link and the diffs.
          exitZeroOnChanges: true
          # Advance the baseline automatically once changes land on main, so PRs
          # only show diffs introduced by that PR.
          autoAcceptChanges: main
