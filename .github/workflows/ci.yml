name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Check (PR — affected only)
        if: github.event_name == 'pull_request'
        run: |
          bun run turbo run lint test typecheck build knip --affected
          bun run turbo boundaries

      - name: Check (main — full)
        if: github.event_name == 'push'
        run: |
          bun run turbo run lint test typecheck build knip
          bun run turbo boundaries
