name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "23 15 * * 1" # weekly audit run, surfaces new advisories between PRs

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  check:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      # Dependabot bumps the root turbo devDependency but not the Dockerfile's
      # toolchain ARG, so images silently build with a different Turborepo
      # than CI unless the two pins are compared (#120).
      - name: Guard Dockerfile turbo pin against package.json
        run: |
          want="$(bun --print 'require("./package.json").devDependencies.turbo')"
          got="$(sed -n 's/^ARG TURBO_VERSION=//p' apps/server/Dockerfile)"
          if [ "$want" != "$got" ]; then
            echo "Turbo pin drift: package.json pins $want but apps/server/Dockerfile pins $got" >&2
            exit 1
          fi

      - name: Check (PR — affected only)
        if: github.event_name == 'pull_request'
        run: |
          bun run turbo run lint test typecheck build knip --affected
          bun run turbo boundaries

      - name: Check (main — full)
        if: github.event_name == 'push'
        run: |
          bun run turbo run lint test typecheck build knip
          bun run turbo boundaries

      # Story smoke tests: every Storybook story renders in real headless
      # Chromium via the Vitest addon (#163). Runs after the unit-test check;
      # coverage and Chromatic are unaffected.
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(bun --print 'require("./package.json").devDependencies.playwright')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright Chromium
        run: bunx playwright install chromium --with-deps

      - name: Story tests
        run: bun run turbo run test:stories

      # Coverage is computed on every run and surfaced in the job summary,
      # so test-depth regressions are visible at review time (#135).
      - name: Coverage
        run: bun run turbo run test:coverage

      - name: Publish coverage summary
        run: bun run coverage:summary >> "$GITHUB_STEP_SUMMARY"

  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup

      - name: Audit dependencies (high severity and above)
        # Advisory on PRs and main pushes: most findings are transitive deps
        # with no local update path, so a hard gate would block unrelated work.
        # The weekly scheduled run DOES fail on findings, so new advisories
        # still surface between PRs (mirrors codeql.yml's cron pattern).
        continue-on-error: ${{ github.event_name != 'schedule' }}
        run: |
          set +e
          bun audit --audit-level=high > audit.txt 2>&1
          status=$?
          cat audit.txt
          { echo '```'; cat audit.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
          exit $status
