name: Dependabot lockfile sync

# Dependabot's npm ecosystem can bump package.json without updating Bun's
# text lockfile (bun.lock). When that happens, `bun install --frozen-lockfile`
# in the setup composite fails, so the PR (and, once merged, main) goes red.
# This job regenerates bun.lock on Dependabot PRs and pushes it back to the PR
# branch so the bump lands green instead of needing a manual sync.
#
# Runs on pull_request_target because Dependabot PRs get a read-only token on
# the plain pull_request event and so cannot push. We check out the PR head but
# only run `bun install --lockfile-only`, which writes the lockfile WITHOUT
# installing or executing any dependency code — so there is no code-execution
# exposure from the elevated token.

on:
  pull_request_target:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  sync-lockfile:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          # A PAT (or app token) is needed for the follow-up push to re-trigger
          # the required CI checks — GITHUB_TOKEN pushes deliberately do not.
          # Falls back to GITHUB_TOKEN, which still fixes the lockfile but won't
          # re-run CI on its own (a manual re-run or re-push is then needed).
          token: ${{ secrets.DEPENDABOT_PAT || secrets.GITHUB_TOKEN }}

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.6

      - name: Regenerate bun.lock
        run: bun install --lockfile-only

      - name: Commit and push if the lockfile changed
        run: |
          if git diff --quiet -- bun.lock; then
            echo "bun.lock already in sync with package.json — nothing to do."
            exit 0
          fi
          git config user.name 'dependabot[bot]'
          git config user.email '49699333+dependabot[bot]@users.noreply.github.com'
          git add bun.lock
          git commit -m 'chore(deps): sync bun.lock with package.json'
          git push
